{% extends 'base.html' %}

{% block content %}

<div class="card">
    <h2>{{ job.title }}</h2>

    <p><strong>Company:</strong> {{ job.company }}</p>
    <p><strong>Description:</strong> {{ job.description }}</p>
    <p><strong>Salary:</strong> ₹{{ job.salary }}</p>
    <p><strong>Posted On:</strong> {{ job.posted_date }}</p>

    <br>

    {% if message %}
        <p class="success">{{ message }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <button class="btn" type="submit">Apply Now</button>
    </form>

    <br>
    <a href="/" class="btn">Back to Jobs</a>
</div>

{% endblock %}
