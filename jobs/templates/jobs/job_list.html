{% extends 'base.html' %}

{% block content %}
<h2>Available Jobs</h2>

{% for job in jobs %}
<div class="card">
    <h3>{{ job.title }}</h3>
    <p><strong>Company:</strong> {{ job.company }}</p>
    <p><strong>Salary:</strong> ₹{{ job.salary }}</p>

    <a class="btn" href="/job/{{ job.id }}/">View Details</a>
</div>
{% endfor %}

{% endblock %}
